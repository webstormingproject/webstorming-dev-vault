<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#15100f" />
  <meta name="description" content="WebStorming OS V1.2.1 — Mission Builder de pilotage global développement multi-IA" />
  <title>WebStorming OS V1.2.1 — Mission Builder</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./assets/css/app.css" />
  <script>
    window.WEBSTORMING_OS_CONFIG = {
      version: '1.2.1',
      releaseName: 'Mission Builder opérationnel',
      expectedBase: '/webstorming-dev-vault/',
      bootTimeoutMs: 9000,
      hardBootTimeoutMs: 25000,
      requiredAssets: [
        './assets/css/app.css',
        './assets/js/boot-guard.js',
        './assets/js/app.js',
        './manifest.webmanifest'
      ]
    };
  </script>
  <script defer src="./assets/js/boot-guard.js"></script>
  <script defer src="./assets/js/app.js"></script>
</head>
<body>
  <noscript>
    <div class="noscript-panel">
      <h1>JavaScript est désactivé</h1>
      <p>WebStorming OS a besoin de JavaScript pour fonctionner.</p>
    </div>
  </noscript>

  <main id="ws-root" class="app-shell" aria-live="polite">
    <section id="ws-loader" class="boot-screen">
      <div class="orb" aria-hidden="true"></div>
      <p class="eyebrow">WebStorming OS</p>
      <h1>Initialisation du Mission Builder v1.2.1...</h1>
      <p id="ws-loader-status">Chargement du moteur de pilotage global.</p>
      <div class="progress"><span></span></div>
    </section>
  </main>

  <section id="ws-boot-panel" class="boot-panel is-hidden" hidden style="display:none">
    <div class="boot-card">
      <p class="eyebrow">Diagnostic</p>
      <h2>Démarrage incomplet</h2>
      <p id="ws-boot-summary">Le cockpit n’a pas terminé son initialisation.</p>
      <pre id="ws-boot-log"></pre>
      <div class="button-row">
        <button type="button" id="ws-retry">Réessayer</button>
        <button type="button" id="ws-clear-cache">Vider cache PWA</button>
        <a class="button ghost" href="./diagnose.html">Diagnostic complet</a>
      </div>
    </div>
  </section>
</body>
</html>
