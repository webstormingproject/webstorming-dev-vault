<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#15100f" />
  <title>Diagnostic — WebStorming OS V1.2.1</title>
  <link rel="stylesheet" href="./assets/css/app.css" />
</head>
<body>
  <main class="main" style="max-width:1100px;margin:0 auto">
    <section class="topbar" style="margin-top:1rem">
      <div>
        <p class="eyebrow">Diagnostic PWA</p>
        <h1>WebStorming OS V1.2.1</h1>
        <p>Teste les fichiers essentiels, le service worker, le cache et le stockage local.</p>
      </div>
      <div class="top-actions"><a class="button primary" href="./index.html">Retour cockpit</a><button class="danger" id="purge">Purger cache</button></div>
    </section>
    <section class="card">
      <h2>Résultats</h2>
      <div id="results" class="list"></div>
    </section>
  </main>
  <script>
    const files = ['./index.html','./assets/css/app.css','./assets/js/boot-guard.js','./assets/js/app.js','./manifest.webmanifest','./sw.js','./assets/icons/icon.svg'];
    const out = document.getElementById('results');
    function item(label, ok, detail) {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `<div class="item-header"><h3>${label}</h3><span class="badge ${ok ? 'green' : 'red'}">${ok ? 'OK' : 'ERREUR'}</span></div><p>${detail || ''}</p>`;
      out.appendChild(div);
    }
    (async () => {
      for (const f of files) {
        try { const r = await fetch(f, {cache:'no-store'}); item(f, r.ok, `HTTP ${r.status}`); }
        catch (e) { item(f, false, e.message); }
      }
      item('Service Worker', 'serviceWorker' in navigator, 'Support navigateur : ' + ('serviceWorker' in navigator));
      item('LocalStorage', (() => { try { localStorage.setItem('__ws_test','1'); localStorage.removeItem('__ws_test'); return true; } catch(e) { return false; } })(), 'Stockage local navigateur');
    })();
    document.getElementById('purge').addEventListener('click', async () => {
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      localStorage.removeItem('webstorming-os-cockpit-v121');
      localStorage.removeItem('webstorming-os-cockpit-v120');
      alert('Cache/service worker/mémoire locale purgés.');
      location.href = './index.html';
    });
  </script>
</body>
</html>
